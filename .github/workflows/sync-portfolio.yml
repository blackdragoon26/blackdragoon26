name: Notify portfolio of README changes

on:
  push:
    branches: [main]
    paths:
      - README.md
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      PORTFOLIO_SYNC_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
    steps:
      - name: Dispatch portfolio sync
        if: ${{ env.PORTFOLIO_SYNC_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
        run: |
          gh api --method POST \
            repos/blackdragoon26/muchBetterPortfolio/dispatches \
            -f event_type=profile-readme-updated \
            -f "client_payload[profile_sha]=${{ github.sha }}"

      - name: Explain missing configuration
        if: ${{ env.PORTFOLIO_SYNC_TOKEN == '' }}
        run: |
          echo "PORTFOLIO_SYNC_TOKEN is not configured; the daily portfolio schedule remains active."
